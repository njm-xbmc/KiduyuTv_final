name: Build Debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Get version name
        id: version
        run: echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Inject TMDB API key
        run: echo "TMDB_API_KEY=${{ secrets.TMDB_API_KEY }}" >> local.properties

      - name: Create dummy google-services.json
        run: |
          cat > app/google-services.json << 'GSEOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "dummy-project-id",
              "storage_bucket": "dummy-project-id.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000001",
                  "android_client_info": {
                    "package_name": "com.kiduyuk.klausk.kiduyutv.phone"
                  }
                },
                "oauth_client": [],
                "api_key": [{"current_key": "dummy"}],
                "services": {"appinvite_service": {"other_platform_oauth_client": []}}
              },
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000002",
                  "android_client_info": {
                    "package_name": "com.kiduyuk.klausk.kiduyutv"
                  }
                },
                "oauth_client": [],
                "api_key": [{"current_key": "dummy"}],
                "services": {"appinvite_service": {"other_platform_oauth_client": []}}
              },
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000003",
                  "android_client_info": {
                    "package_name": "com.kiduyuk.klausk.kiduyutv.tv"
                  }
                },
                "oauth_client": [],
                "api_key": [{"current_key": "dummy"}],
                "services": {"appinvite_service": {"other_platform_oauth_client": []}}
              }
            ],
            "configuration_version": "1"
          }
          GSEOF

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: List APK outputs
        run: find app/build/outputs/apk -name "*.apk" | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          files: app/build/outputs/apk/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
